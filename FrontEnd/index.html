<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Camera App</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

</head>
<body>

<div class="app-container">
    

     <div class="header">
            <button class="back-btn">←</button>
            <h1 class="title">AI Studio</h1>
            <button class="archive-btn">⊞</button>
        </div> 

    <div id="screen-studio">
        <div class="image-section">
            <input type="file" accept="image/*" id="img_input">
            <img src="" alt="" id="img_preview">
            <div id="ai-response"></div>
        </div>
    </div>
    <div id="screen-mindmap">
        <div class="minmap-container"></div>
    </div>

    
    <div class="chat-section">
        <div class="input-wrapper">
            <textarea name="input" id="user_msg" wrap="soft" rows="1"></textarea>
            <!--<input type="text" id="user_msg"> -->
            <button id="request_send"><svg xmlns="http://www.w3.org/2000/svg" width="17"  viewBox="0 0 512 512"><!-- Icon from Siemens Industrial Experience Icons by Siemens AG - https://github.com/siemens/ix-icons/blob/main/LICENSE.md --><path fill="#fff" d="M256 277.333v-42.666H122.027L64 42.667L469.333 256L64 469.333l57.6-192z"/></svg></button>
       </div>
    </div>
</div>

<script src="script.js" defer></script>

</body>
</html>
