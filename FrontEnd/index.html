<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Camera App</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
<div class="app-container">
    <script src="script.js" defer></script>

    <div id="screen-studio">

        <div class="header">
            <button class="back-btn">←</button>
            <h1 class="title">AI Studio</h1>
            <button class="archive-btn">⊞</button>
        </div> 

        <div class="image_section">
            <input type="file" accept="image/*" id="img_input">
            <img src="" alt="" id="img_preview">
            <div id="ai-response"></div>
        </div>
    </div>
    <div id="screen-mindmap">

        <div class="header">
            <button class="back-btn">←</button>
            <h1 class="title">mindmap</h1>
            <button class="archive-btn">⊞</button>
        </div> 

        <div class="minmap-container"></div>
    </div>

    
    <div class="chat-section">
        <input type="text" id="user_msg">
        <button id="request_send">send</button>
    </div>
</div>
</body>
</html>
